
version: "3.8"
 
services:
 
  fastapi:
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
      --reload-dir /app/config
      --log-level debug
    environment:
      APP_ENVIRONMENT: "development"
      APP_DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./main.py:/app/main.py
    ports:
      - "8000:8000"
      - "5678:5678"
 
  celery-worker-high:
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=high,shared_cleanup
      --concurrency=1
      --prefetch-multiplier=1
      --loglevel=debug
      --hostname=worker-high@%h
    environment:
      APP_ENVIRONMENT: "development"
      LOG_LEVEL: "DEBUG"
    volumes:
      - ./app:/app/app
      - ./config:/app/config
 
  celery-worker-default:
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=default,low
      --concurrency=1
      --prefetch-multiplier=1
      --loglevel=debug
      --hostname=worker-default@%h
    environment:
      APP_ENVIRONMENT: "development"
      LOG_LEVEL: "DEBUG"
    volumes:
      - ./app:/app/app
      - ./config:/app/config
 
  celery-beat:
    environment:
      APP_ENVIRONMENT: "development"
    volumes:
      - ./app:/app/app
      - ./config:/app/config
 
  qdrant:
    environment:
      QDRANT__LOG_LEVEL: "WARN"
    ports:
      - "6333:6333"
      - "6334:6334"
 
  redis:
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --loglevel warning
    environment:
      REDIS_PASSWORD: ""
 
  chainlit:
    command: chainlit run app.py --host 0.0.0.0 --port 8080 -w
    environment:
      FASTAPI_URL: "http://fastapi:8000"
      CHAINLIT_DEFAULT_TENANT: "demo-corp"
    volumes:
      - ./chainlit_app/app.py:/app/app.py
      - ./chainlit_app/.chainlit:/app/.chainlit

  sqlserver:
    environment:
      MSSQL_MEMORY_LIMIT_MB: 1024

