version: "3.8"
name: rag-system  #nome prj! (se non lo specifici qua allora si setta come nome folder che contiene questo docker-compose file) quindi ora e.g.i nomi dei containers saranno <project_name>-<service_name>-<index>

services:


  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi.Dockerfile
    #container_name: fastapi  !non specificare il nome, xk tu hai 1 solo server quindi ci sarebbe conflitto nome container e.g.fastapi di dev env -- fastapi staging env. senza sepcificare docker crea automaticamente e.g. <project_name>-<service_name>-<index> cioe <nome_prj>-fastapi-1
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      SQLSERVER_HOST: "sqlserver"
      SQLSERVER_PORT: "1433"
      SQLSERVER_DB: "RAGChat"
      QDRANT_URL: "http://qdrant:6333"
      BASE_URL_OLLAMA: "http://ollama:11434"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./config:/app/config:ro
      - ${DATA_ROOT}/uploads:/app/uploads  #uploads_data:/app/uploads, 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - rag-network


  celery-worker-high:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    #container_name: celery-worker-high
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=high,shared_cleanup
      --concurrency=4
      --prefetch-multiplier=1
      --loglevel=info
      --hostname=worker-high@%h

    env_file: .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      SQLSERVER_HOST: "sqlserver"
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - ${DATA_ROOT}/uploads:/app/uploads  #corretto deve sharing stesso volume also w fastapi e celery-worker-default  #uploads_data:/app/uploads
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app.celery_app", "inspect", "ping", "-d", "worker-high@%h"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rag-network


  celery-worker-default:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    #container_name: celery-worker-default
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=default,low
      --concurrency=2
      --prefetch-multiplier=1
      --loglevel=info
      --hostname=worker-default@%h
    env_file: .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      SQLSERVER_HOST: "sqlserver"
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - ${DATA_ROOT}/uploads:/app/uploads   #uploads_data:/app/uploads
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rag-network


  celery-beat:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    #container_name: celery-beat
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app.celery_app beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler
    env_file: .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - redis
    networks:
      - rag-network


  flower:
    image: mher/flower:2.0
    #container_name: flower
    restart: unless-stopped
    command: >
      celery
      --broker=redis://redis:6379/0
      flower
      --port=5555
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    networks:
      - rag-network


  chainlit:
    build:
      context: .
      dockerfile: docker/chainlit.Dockerfile
    #container_name: chainlit
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      FASTAPI_URL: "http://fastapi:8000"
      CHAINLIT_DEFAULT_TENANT: "${CHAINLIT_DEFAULT_TENANT:-demo-corp}"
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - rag-network


  qdrant:
    image: qdrant/qdrant:v1.4.2
    #container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${DATA_ROOT}/qdrant:/qdrant/storage   #qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: "INFO"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - rag-network


  redis:
    image: redis:7.0-alpine
    #container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ${DATA_ROOT}/redis:/data   #redis_data:/data
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network


  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    #container_name: sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"
    volumes:
      - ${DATA_ROOT}/sqlserver:/var/opt/mssql  #sqlserver_data:/var/opt/mssql 
      - ./docker/sqlserver/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/sqlserver/entrypoint.sh:/init/entrypoint.sh:ro
    environment:
      SA_PASSWORD: "${SQLSERVER_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_COLLATION: "Latin1_General_100_CI_AS_SC_UTF8"
      MSSQL_MEMORY_LIMIT_MB: 2048
    command: >
      /bin/bash -c "
      /opt/mssql/bin/sqlservr &
      SQLSERVR_PID=$$!
      /init/entrypoint.sh
      wait $$SQLSERVR_PID"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost",
             "-U", "SA",
             "-P", "${SQLSERVER_PASSWORD}",
             "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rag-network

#questo non serve piu xk stai usando bind mount verso directory specifiche(decise da TE) del server!
#prima e.g.qdrant_data:/qdrant/storage  salvava i dati persistenti (volumes) dentro  e.g./var/lib/docker/volumes/qdrant_data/_data in maniera gestita da docker
# volumes:
#   qdrant_data:
#     driver: local
#   redis_data:
#     driver: local
#   sqlserver_data:
#     driver: local
#   uploads_data:
#     driver: local

networks:
  rag-network:
    name: ${DOCKER_NETWORK}
    driver: bridge


