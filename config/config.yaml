app:
  name: "Compet-e Srl RAG Enterprise Legal"
  version: "0.1.0"
  debug: false
  environment: "development"
  description: "Compet-eSrl RAG system enterprise legal: con retrieval ibrido reranking e memoria conversazionale"

ingestion:
  parser:
    prefer_docling: true
    extract_tables: true
    extract_images: false
    languages: ["it", "en"]
  splitter:
    chunk_size: 1000
    chunk_overlap: 200
    strategy: "markdown"
  loader:
    extensions: [".pdf", ".docx", ".xlsx", ".pptx", ".txt", ".md"]
    max_file_size_mb: 100

embeddings:
  provider: "fastembed"
  model: "BAAI/BGE-M3"
  base_url: ""
  batch_size: 64
  cache_dir: "/app/.cache/embeddings"

llm:
  provider: "ollama"
  model: "llama3.1"
  num_ctx: 2048
  api_key: "${OLLAMA_API_KEY}"
  base_url: "http://ollama:11434"
  temperature: 0.0
  max_tokens: 2048
  timeout: 120
  streaming: true

retriever:
  search_type: "hybrid"
  retrieval_strategy: "mmr"
  top_k: 20
  mmr_lambda: 0.5
  auto_filter: false

reranker:
 enabled: true
 model: "BAAI/bge-reranker-base"
 top_k: 5
 initial_k: 20

metadata:
  config_file: "/app/config/metadata.yaml"

vectorstore:
  url: "http://qdrant:6333"
  api_key: "${QDRANT_API_KEY}"
  collection_name: "collection-competeSrl-RAGv2"
  use_sparse: true
  force_recreate: false
  distance: "Cosine"
  on_disk_payload: true

memory:
  short_term_turns: 10
  long_term_enabled: false
  session_ttl_hours: 24

cache:
  query_ttl_seconds: 3600
  session_ttl_seconds: 86400

web_search:
  enabled: false
  provider: "tavily"
  api_key: "${TAVILY_API_KEY}"
  max_results: 5

  

logging: 
  level: "INFO"
  console_output: true
  colored: true
  json_output: false

observability:
  langsmith_enabled: false
  langsmith_project: "compet-eSrl-RAGenterprise-legal"
  opentelemetry_enabled: false

rate_limit:
  requests_per_minute: 60
  tokens_per_day: 100000

security:
  jwt_algorithm: "HS256"
  jwt_expire_minutes: 60
  api_key_length: 32
  password_min_length: 12  

