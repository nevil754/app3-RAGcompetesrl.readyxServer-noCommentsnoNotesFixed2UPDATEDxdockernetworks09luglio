
logging:
  level: "INFO"
  console_output: true
  colored: true
  json_output: false

  format:
    console: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
    json_fields:
      - "time"
      - "level"
      - "name"
      - "line"
      - "message"
      - "extra"

  file:
    enabled: false
    path: "/app/logs/rag-{time:YYYY-MM-DD}.log"
    rotation: "00:00"
    retention: "30 days"
    compression: "gz"
    level: "DEBUG"

  context_fields:
    - "tenant_id"
    - "request_id"
    - "user_id"
    - "route"

